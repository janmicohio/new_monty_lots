<!doctype html>
<html lang="en">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Quick Start - Leaflet</title>

    <link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Leaflet MarkerCluster plugin -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <!-- Leaflet Awesome Markers plugin -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.min.js"></script>

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- Custom styles -->
    <link rel="stylesheet" href="static/styles/main.css" />
  </head>
  <body>
    <!-- Mobile sidebar toggle -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="container">
      <div class="sidebar" id="sidebar">
        <h2>Monty Lots</h2>

        <!-- Search Section -->
        <div class="search-section">
          <h3>Search Features</h3>
          <div class="search-container">
            <input type="text" id="search-input" placeholder="Search all fields..." />
            <button id="clear-search">Clear</button>
          </div>

          <div class="search-results">
            <span id="search-count">Search all properties</span>
          </div>

          <!-- Advanced Search Toggle -->
          <button id="toggle-advanced-search" class="advanced-search-toggle">
            ▼ Show Advanced Search
          </button>

          <!-- Advanced Search Panel -->
          <div id="advanced-search-panel" class="advanced-search-panel" style="display: none">
            <div id="advanced-filters-container">
              <!-- Advanced filters will be dynamically generated -->
            </div>
          </div>
        </div>

        <!-- Election Data Section -->
        <div class="election-section" id="election-section" style="display: none">
          <h3>Election Data</h3>

          <!-- Comparison Mode Toggle -->
          <div class="election-controls">
            <label class="comparison-toggle">
              <input type="checkbox" id="comparison-mode-toggle" />
              <span>Compare 2024 vs 2025 Turnout</span>
            </label>
          </div>

          <!-- Single Year Mode Controls -->
          <div id="single-year-controls">
            <div class="election-controls">
              <label for="election-year">Year:</label>
              <select id="election-year">
                <option value="">-- Select Year --</option>
              </select>
            </div>

            <div class="election-controls" id="race-selector-container" style="display: none">
              <label for="race-selector">Race:</label>
              <select id="race-selector">
                <option value="">-- Select Race --</option>
                <option value="__TURNOUT__">📊 View Voter Turnout</option>
              </select>
            </div>

            <div id="race-summary" class="race-summary" style="display: none">
              <!-- Race summary will be dynamically populated -->
            </div>

            <div id="turnout-summary" class="turnout-summary" style="display: none">
              <!-- Turnout summary will be dynamically populated -->
            </div>
          </div>

          <!-- Comparison Mode Summary -->
          <div id="comparison-summary" class="comparison-summary" style="display: none">
            <!-- Comparison statistics will be dynamically populated -->
          </div>
        </div>

        <!-- Precinct Filters Section -->
        <div class="filter-section" id="filter-section" style="display: none">
          <h3>Filter Precincts</h3>

          <div class="filter-controls">
            <label for="precinct-search">Search by Name:</label>
            <input type="text" id="precinct-search" placeholder="Enter precinct name..." />
          </div>

          <div class="filter-controls">
            <label for="turnout-filter">Turnout Range:</label>
            <div class="range-inputs">
              <input type="number" id="turnout-min" placeholder="Min %" min="0" max="100" step="1" />
              <span>to</span>
              <input type="number" id="turnout-max" placeholder="Max %" min="0" max="100" step="1" />
            </div>
          </div>

          <div class="filter-controls">
            <label for="winner-filter">Filter by Winner:</label>
            <select id="winner-filter">
              <option value="">-- All Winners --</option>
            </select>
          </div>

          <div class="filter-actions">
            <button id="apply-filters" class="btn btn-primary">Apply Filters</button>
            <button id="clear-filters" class="btn btn-secondary">Clear All</button>
          </div>

          <div id="filter-results" class="filter-results" style="display: none">
            <!-- Filter results summary -->
          </div>
        </div>

        <h3>Available Layers</h3>
        <ul id="layer-list" class="layer-list">
          <li>Loading layers...</li>
        </ul>

        <div class="stats">
          <h3>Statistics</h3>
          <div id="stats-content">
            <p><strong>Total Layers:</strong> <span id="layer-count">-</span></p>
            <p><strong>Loaded Layers:</strong> <span id="loaded-count">-</span></p>
            <p><strong>Total Features:</strong> <span id="total-features">-</span></p>
          </div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <!-- Dynamic Legend -->
    <div id="legend" class="legend" style="display: none">
      <div class="legend-toggle" onclick="toggleLegend()">
        <span>Map Legend</span>
      </div>
      <div class="legend-content" id="legend-content">
        <!-- Legend content will be dynamically generated -->
      </div>
    </div>

    <script type="module" src="static/scripts/main.js"></script>
  </body>
</html>
